version: v1
plugins:
  - plugin: go
    out: .
    opt:
      - paths=import
      - module=github.com/topcms/api-contracts
  - plugin: go-grpc
    out: .
    opt:
      - paths=import
      - module=github.com/topcms/api-contracts
  - plugin: go-http
    out: .
    opt:
      - paths=import
      - module=github.com/topcms/api-contracts
